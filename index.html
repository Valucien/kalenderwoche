<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalenderwoche</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e10;
      color: #f0ede6;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,96,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,96,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #18181c;
      border: 1px solid #2e2e36;
      border-radius: 20px;
      padding: 2.5rem 3rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 0 80px rgba(200,240,96,0.07), 0 8px 48px rgba(0,0,0,0.6);
    }

    .tag { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c8f060; margin-bottom: 0.4rem; }

    h1 { font-size: 2.2rem; font-weight: bold; color: #f0ede6; margin-bottom: 0.2rem; line-height: 1.1; }
    h1 span { color: #c8f060; }

    .sub { font-size: 0.75rem; color: #6a6a78; margin-bottom: 2rem; }

    .input-label { font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: #6a6a78; margin-bottom: 0.5rem; }

    input[type="date"] {
      width: 100%;
      background: #0e0e10;
      border: 1px solid #2e2e36;
      border-radius: 10px;
      color: #f0ede6;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 0.8rem 1rem;
      outline: none;
      margin-bottom: 0.75rem;
      color-scheme: dark;
    }

    input[type="date"]:focus { border-color: #c8f060; box-shadow: 0 0 0 3px rgba(200,240,96,0.12); }

    .btn-today {
      background: transparent;
      border: 1px solid #2e2e36;
      border-radius: 8px;
      color: #6a6a78;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      padding: 0.4rem 0.85rem;
      cursor: pointer;
      margin-bottom: 1rem;
      display: block;
    }
    .btn-today:hover { border-color: #60d0f0; color: #60d0f0; }

    .btn-calc {
      width: 100%;
      padding: 0.85rem;
      background: #c8f060;
      color: #0e0e10;
      border: none;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-calc:hover { background: #d9ff70; box-shadow: 0 0 24px rgba(200,240,96,0.35); }

    .result {
      margin-top: 2rem;
      border-top: 1px solid #2e2e36;
      padding-top: 1.75rem;
      display: none;
    }

    .res-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #6a6a78; margin-bottom: 0.5rem; }

    .kw-row { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 1.5rem; }
    .kw-pre { font-size: 0.95rem; color: #6a6a78; }
    .kw-num { font-size: 5rem; line-height: 1; color: #c8f060; font-weight: bold; text-shadow: 0 0 40px rgba(200,240,96,0.3); }
    .kw-yr { font-size: 1rem; color: #6a6a78; padding-bottom: 0.5rem; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .box { background: #0e0e10; border: 1px solid #2e2e36; border-radius: 8px; padding: 0.7rem 0.9rem; }
    .box-key { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: #6a6a78; margin-bottom: 0.25rem; }
    .box-val { font-size: 0.82rem; color: #f0ede6; }
  </style>
</head>
<body>
<div class="card">
  <div class="tag">Tool</div>
  <h1>Kalender<span>woche</span></h1>
  <p class="sub">Datum eingeben → KW sofort anzeigen</p>

  <div class="input-label">Datum</div>
  <input type="date" id="dateInput" />

  <button class="btn-today" onclick="setToday()">↩ Heute</button>
  <button class="btn-calc" onclick="calculate()">Kalenderwoche berechnen</button>

  <div class="result" id="result">
    <div class="res-label">Ergebnis</div>
    <div class="kw-row">
      <span class="kw-pre">KW</span>
      <span class="kw-num" id="kwNum">—</span>
      <span class="kw-yr" id="kwYr"></span>
    </div>
    <div class="grid">
      <div class="box"><div class="box-key">Wochentag</div><div class="box-val" id="rDay">—</div></div>
      <div class="box"><div class="box-key">Datum</div><div class="box-val" id="rDate">—</div></div>
      <div class="box"><div class="box-key">Quartal</div><div class="box-val" id="rQ">—</div></div>
      <div class="box"><div class="box-key">Tag des Jahres</div><div class="box-val" id="rDoy">—</div></div>
    </div>
  </div>
</div>

<script>
  var WD = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  var MO = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

  function getKW(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var day = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - day);
    var y1 = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return { kw: Math.ceil((((d - y1) / 86400000) + 1) / 7), yr: d.getUTCFullYear() };
  }

  function getDoy(date) {
    var s = new Date(date.getFullYear(), 0, 0);
    return Math.floor((date - s + (s.getTimezoneOffset() - date.getTimezoneOffset()) * 60000) / 86400000);
  }

  function todayVal() {
    var t = new Date();
    return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
  }

  function setToday() {
    document.getElementById('dateInput').value = todayVal();
    calculate();
  }

  function calculate() {
    var v = document.getElementById('dateInput').value;
    if (!v) return;
    var parts = v.split('-').map(Number);
    var date = new Date(parts[0], parts[1]-1, parts[2]);
    var r = getKW(date);
    document.getElementById('kwNum').textContent = String(r.kw).padStart(2,'0');
    document.getElementById('kwYr').textContent = '/ ' + r.yr;
    document.getElementById('rDay').textContent = WD[date.getDay()];
    document.getElementById('rDate').textContent = parts[2] + '. ' + MO[parts[1]-1] + ' ' + parts[0];
    document.getElementById('rQ').textContent = 'Q' + Math.ceil(parts[1]/3) + ' / ' + parts[0];
    document.getElementById('rDoy').textContent = getDoy(date) + '. von 365';
    document.getElementById('result').style.display = 'block';
  }

  document.getElementById('dateInput').addEventListener('change', calculate);
  setToday();
</script>
</body>
</html>
