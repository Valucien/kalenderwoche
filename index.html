<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalenderwoche</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2e2e36;
      --accent: #c8f060;
      --accent2: #60d0f0;
      --text: #f0ede6;
      --muted: #6a6a78;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 3.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 80px rgba(200,240,96,0.06), 0 8px 48px rgba(0,0,0,0.5);
    }

    .label-top {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    h1 span {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .input-group {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .input-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="date"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,240,96,0.12);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(80%) sepia(80%) saturate(400%) hue-rotate(30deg);
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      margin-top: 0.25rem;
    }

    .btn:hover {
      background: #d9ff70;
      box-shadow: 0 0 24px rgba(200,240,96,0.35);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .result {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 2rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .result.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .kw-display {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .kw-prefix {
      font-size: 1rem;
      color: var(--muted);
    }

    .kw-number {
      font-family: 'DM Serif Display', serif;
      font-size: 5rem;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(200,240,96,0.3);
    }

    .kw-year {
      font-size: 1.1rem;
      color: var(--muted);
      align-self: flex-end;
      padding-bottom: 0.5rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .meta-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .meta-box .meta-key {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    .meta-box .meta-val {
      font-size: 0.85rem;
      color: var(--text);
    }

    .today-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-bottom: 1.25rem;
      letter-spacing: 0.05em;
    }

    .today-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .error-msg {
      font-size: 0.78rem;
      color: #ff7070;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="label-top">Tool</div>
  <h1>Kalender<span>woche</span></h1>
  <p class="subtitle">Datum eingeben → KW sofort anzeigen</p>

  <div class="input-group">
    <label for="dateInput">Datum</label>
    <input type="date" id="dateInput" />
    <div class="error-msg" id="errorMsg">Bitte ein gültiges Datum eingeben.</div>
  </div>

  <button class="today-btn" onclick="setToday()">↩ Heute verwenden</button>

  <button class="btn" onclick="calculate()">Kalenderwoche berechnen</button>

  <div class="result" id="result">
    <div class="result-label">Ergebnis</div>
    <div class="kw-display">
      <span class="kw-prefix">KW</span>
      <span class="kw-number" id="kwNumber">—</span>
      <span class="kw-year" id="kwYear"></span>
    </div>
    <div class="meta-grid">
      <div class="meta-box">
        <div class="meta-key">Wochentag</div>
        <div class="meta-val" id="weekday">—</div>
      </div>
      <div class="meta-box">
        <div class="meta-key">Datum</div>
        <div class="meta-val" id="formattedDate">—</div>
      </div>
      <div class="meta-box">
        <div class="meta-key">Quartal</div>
        <div class="meta-val" id="quarter">—</div>
      </div>
      <div class="meta-box">
        <div class="meta-key">Tag des Jahres</div>
        <div class="meta-val" id="dayOfYear">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  const WEEKDAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const MONTHS   = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

  function getISOWeek(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return { week: Math.ceil((((d - yearStart) / 86400000) + 1) / 7), year: d.getUTCFullYear() };
  }

  function getDayOfYear(date) {
    const start = new Date(date.getFullYear(), 0, 0);
    const diff = date - start + (start.getTimezoneOffset() - date.getTimezoneOffset()) * 60000;
    return Math.floor(diff / 86400000);
  }

  function setToday() {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${y}-${m}-${d}`;
    calculate();
  }

  function calculate() {
    const input = document.getElementById('dateInput');
    const errorMsg = document.getElementById('errorMsg');

    if (!input.value) {
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';

    const [y, m, d] = input.value.split('-').map(Number);
    const date = new Date(y, m - 1, d);

    const { week, year } = getISOWeek(date);
    const quarter = Math.ceil(m / 3);
    const doy = getDayOfYear(date);

    document.getElementById('kwNumber').textContent = String(week).padStart(2, '0');
    document.getElementById('kwYear').textContent = year;
    document.getElementById('weekday').textContent = WEEKDAYS[date.getDay()];
    document.getElementById('formattedDate').textContent = `${d}. ${MONTHS[m-1]} ${y}`;
    document.getElementById('quarter').textContent = `Q${quarter} / ${year}`;
    document.getElementById('dayOfYear').textContent = `${doy}. von 365`;

    const result = document.getElementById('result');
    result.classList.remove('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => result.classList.add('visible')));
  }

  // Allow Enter key
  document.getElementById('dateInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });

  // Auto-calculate when date changes
  document.getElementById('dateInput').addEventListener('change', calculate);

  // Set today on load
  setToday();
</script>
</body>
</html>
